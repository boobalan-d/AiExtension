<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>AiSolutions Icon Generator</h2>
<p>Open this file in Chrome, right-click each canvas below, and "Save image as..." to the icons folder.</p>
<canvas id="c128" width="128" height="128"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c16" width="16" height="16"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.22; // corner radius
  
  // Rounded rect background with gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#8b5cf6');
  
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Brain/sparkle symbol
  const cx = s / 2, cy = s / 2;
  const scale = s / 128;
  
  // Neural nodes
  const nodes = [
    [cx, cy - 22*scale],
    [cx - 18*scale, cy - 8*scale],
    [cx + 18*scale, cy - 8*scale],
    [cx - 14*scale, cy + 12*scale],
    [cx + 14*scale, cy + 12*scale],
    [cx, cy + 24*scale],
  ];
  
  // Connections
  ctx.strokeStyle = 'rgba(165, 180, 252, 0.4)';
  ctx.lineWidth = 1.5 * scale;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      ctx.beginPath();
      ctx.moveTo(nodes[i][0], nodes[i][1]);
      ctx.lineTo(nodes[j][0], nodes[j][1]);
      ctx.stroke();
    }
  }
  
  // Nodes
  nodes.forEach(([x, y], i) => {
    const ng = ctx.createRadialGradient(x, y, 0, x, y, 6*scale);
    ng.addColorStop(0, '#e0e7ff');
    ng.addColorStop(1, '#a5b4fc');
    ctx.beginPath();
    ctx.arc(x, y, (i === 0 || i === 5 ? 5 : 4) * scale, 0, Math.PI * 2);
    ctx.fillStyle = ng;
    ctx.fill();
  });
  
  // Sparkle
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(cx + 28*scale, cy - 28*scale, 3*scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 22*scale, cy - 32*scale, 1.5*scale, 0, Math.PI * 2);
  ctx.fill();
}

drawIcon(document.getElementById('c128'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c16'));

// Auto-download PNGs
['c128','c48','c16'].forEach(id => {
  const c = document.getElementById(id);
  const link = document.createElement('a');
  link.download = `icon${c.width}.png`;
  link.href = c.toDataURL('image/png');
  link.textContent = ` | Download icon${c.width}.png`;
  document.body.appendChild(link);
});
</script>
</body>
</html>
